version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spond_db
    environment:
      POSTGRES_DB: spondclub
      POSTGRES_USER: spond
      POSTGRES_PASSWORD: spond123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spond -d spondclub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/club
      dockerfile: Dockerfile
    container_name: spond_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spondclub
      SPRING_DATASOURCE_USERNAME: spond
      SPRING_DATASOURCE_PASSWORD: spond123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spond_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: